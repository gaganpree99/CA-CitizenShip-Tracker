name: IRCC Status Check

on:
  schedule:
    - cron: '0 * * * *' # Every hour at the beginning of the hour
  workflow_dispatch: # Allow manual trigger

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run status check
        env:
          UCI: ${{ secrets.UCI }}
          APP_NUMBER: ${{ secrets.APP_NUMBER }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit and push status changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Ensure files exist before adding
          touch status.json tracker.log
          git add status.json tracker.log
          git commit -m "Update status" || echo "No changes to commit"
          git push
